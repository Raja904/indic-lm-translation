experiment_name: "lstm_bahdanau_v1"
seed: 42
model:
  type: "lstm_seq2seq"
  encoder_dim: 512
  decoder_dim: 512
  embedding_dim: 256
  n_layers: 2
  dropout: 0.3
  attention: "bahdanau"

training:
  batch_size: 64
  epochs: 20
  lr: 0.001
  mixed_precision: true
  clip_grad: 1.0

data:
  src_lang: "hi"
  trg_lang: "mr"
  train_path: "data/processed/train.csv"
  val_path: "data/processed/val.csv"
  vocab_size: 32000
