experiment_name: "bert_pretrain_110m"
seed: 42
model:
  type: "bert"
  n_layers: 12
  n_heads: 12
  d_model: 768
  d_ff: 3072
  dropout: 0.1
  max_seq_len: 512

training:
  batch_size: 32
  epochs: 10
  lr: 0.0001
  mixed_precision: true
  weight_decay: 0.01

data:
  vocab_path: "tokenizer/spm_hi_mr.model"
  train_data: "data/tokenized/pretrain_corpus.pt"
